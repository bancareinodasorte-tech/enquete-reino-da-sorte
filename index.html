<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REINO DA SORTE - Enquete V3</title>
<style>
body{margin:0;font-family:Arial;background:#021b55;color:white}
.topo{background:url('fundo-oficial.jpg') center/cover no-repeat;padding:40px 20px;text-align:center}
.logo{width:140px;border-radius:25px;box-shadow:0 0 30px rgba(0,0,0,.5)}

.box{background:white;color:#061b4e;margin:20px;padding:20px;border-radius:25px}
.botao{background:#0a2f88;color:white;padding:18px;border:none;border-radius:18px;font-weight:bold;width:100%;margin-top:10px;font-size:18px}
.importar{border:3px dashed #8aa7ff;padding:30px;border-radius:20px;text-align:center;margin-top:20px}

<body>

<div class="topo">
<img src="logo-reino-da-sorte.jpeg" class="logo">
<h1>Enquete Oficial</h1>
<p>Sistema Profissional V3</p>
</div>

<div class="box">
<h2>Importar membros</h2>

<div class="importar">
<h3>IMPORTAR PRINT / PDF / IMAGEM</h3>
<p>Nova estrutura preparada para OCR inteligente.</p>
<input type="file">
</div>

<button class="botao">PROCESSAR MEMBROS</button>
<button class="botao">EXPORTAR CSV</button>
<button class="botao">LISTA DE FALTANTES</button>

</div>

</body>
</html>
